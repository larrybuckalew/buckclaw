# ── LLM Provider ─────────────────────────────────────────────────────────────
#
# Option A: Anthropic direct
#   model:    claude-3-5-haiku-20241022   (or claude-3-5-sonnet-20241022, etc.)
#   api_key:  sk-ant-...
#   api_base: null
#
# Option B: OpenRouter  (access 200+ models with one key)
#   model:    openrouter/anthropic/claude-3-5-haiku   (or openrouter/openai/gpt-4o, etc.)
#   api_key:  sk-or-v1-...
#   api_base: https://openrouter.ai/api/v1
#
# Full model list: https://openrouter.ai/models
# -----------------------------------------------------------------------------
llm:
  model: claude-3-5-haiku-20241022
  api_key: YOUR_API_KEY_HERE
  api_base: null

websearch:
  api_key: YOUR_BRAVE_SEARCH_API_KEY

channels:
  telegram:
    token: YOUR_TELEGRAM_BOT_TOKEN

api:
  enabled: false
  host: localhost
  port: 8000

agent:
  name: my-bot
  description: An AI assistant

heartbeat:
  enabled: false
  interval_seconds: 1800
  prompt: "Check in: summarize any pending tasks or reminders."
